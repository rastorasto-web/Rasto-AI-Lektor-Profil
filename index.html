<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasťo Kozlík | AI Konzultant</title>

    <!-- 1. Načítanie Tailwind CSS pre dizajn -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Konfigurácia tmavého režimu (prepínanie cez triedu "dark") -->
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>

    <!-- 2. Načítanie Reactu a ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>

    <!-- 3. Babel pre preklad JSX v prehliadači -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }

        /* Custom animácie */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(6deg); }
        }
        .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }

        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 22s linear infinite; }

        /* CSS pre 3D kocku (referencie) */
        .scene { perspective: 1000px; }
        .cube {
          position: relative; width: 100%; height: 100%;
          transform-style: preserve-3d;
          transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cube-face {
          position: absolute; width: 100%; height: 100%;
          backface-visibility: hidden; border-radius: 1.5rem;
        }
        .face-0 { transform: rotateX(0deg) translateZ(160px); }
        .face-1 { transform: rotateX(-90deg) translateZ(160px); }
        .face-2 { transform: rotateX(-180deg) translateZ(160px); }
        .face-3 { transform: rotateX(-270deg) translateZ(160px); }

        /* CSS pre OTÁČACIE cenové karty */
        .flip-card { perspective: 1600px; }
        .flip-inner {
          position: relative; width: 100%; height: 100%;
          transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
          transform-style: preserve-3d;
        }
        .flip-card.is-flipped .flip-inner { transform: rotateY(180deg); }
        @media (hover: hover) and (pointer: fine) {
          .flip-card:hover .flip-inner { transform: rotateY(180deg); }
        }
        .flip-face {
          position: absolute; inset: 0;
          -webkit-backface-visibility: hidden; backface-visibility: hidden;
          display: flex; flex-direction: column;
          border-radius: 1.5rem; overflow: hidden;
        }
        .flip-back { transform: rotateY(180deg); }
    </style>
</head>

            return (
                <div className="font-sans text-[#333333] dark:text-gray-300 bg-white dark:bg-[#0a0a0a] min-h-screen flex flex-col transition-colors duration-300">

                <section id="prínos" className="py-20 bg-[#000000] text-white relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#ffffff_1px,transparent_1px)] [background-size:20px_20px]"></div>
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                    <div>
                        <h2 className="text-3xl lg:text-4xl font-bold mb-6">Prečo sa firmám oplatí <br /><span className="text-[#E60000]">poslať ľudí na môj workshop?</span></h2>
                        <p className="text-[#D1D5DB] text-lg mb-12 leading-relaxed max-w-2xl mx-auto">
                        AI nie je o náhrade ľudí, ale o ich „superschopnostiach“. Vďaka mojej HR praxi viem presne, kde vás tlačí topánka a nezdržujem vás technickými detailmi, ktoré v práci nevyužijete.
                        </p>
                        <div className="grid md:grid-cols-3 gap-8 text-left">
                        {[
                            { title: "Okamžitá aplikácia", desc: "Čo sa naučíte doobeda, poobede používate v práci." },
                            { title: "Expertíza v HR", desc: "Viem, čo znamená nábor, onboarding či sales. Učím v kontexte." },
                            { title: "Prispôsobenie", desc: "Malá firma? Korporát? Prispôsobujem príklady vášmu kontextu." }
                        ].map((item, i) => (
                            <div key={i} className="bg-[#333333] p-6 rounded-2xl border border-[#54595F] hover:border-[#E60000] transition-colors">
                            <div className="mb-4"><CheckCircle className="text-[#E60000] w-8 h-8" /></div>
                            <div>
                                <h4 className="font-bold text-xl mb-2">{item.title}</h4>
                                <p className="text-gray-400 text-sm">{item.desc}</p>
                            </div>
                            </div>
                        ))}
                        </div>
                    </div>
                    </div>
                </section>

                {/* Testimonials Section - The 3D Cube */}
                <section id="referencie" className="py-24 bg-gray-50 dark:bg-[#0f0f0f] overflow-hidden">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center mb-12">
                    <h2 className="text-3xl font-bold text-black dark:text-white">Čo hovoria účastníci</h2>
                    <p className="text-[#54595F] dark:text-gray-400 mt-2">Prejdite myšou po kartičke pre ďalšiu referenciu</p>
                    </div>

                    <div className="w-full max-w-2xl mx-auto px-4 h-[320px]">
                    <div className="scene w-full h-full" onMouseEnter={handleCubeHover} onMouseLeave={handleCubeLeave}>
                        <div className="cube" style={{ transform: `translateZ(-160px) rotateX(${cubeRotation}deg)` }}>
                        {testimonials.map((item, index) => (
                            <div key={index} className={`cube-face face-${index} p-8 flex flex-col items-center justify-center shadow-xl bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-gray-800`}>
                            <Quote className="w-10 h-10 text-[#E60000] mb-4 opacity-20" />
                            <p className="text-lg text-[#333333] dark:text-gray-200 text-center italic mb-6 leading-relaxed font-medium">„{item.text}“</p>
                            <div className="mt-auto text-center">
                                <h4 className="text-xl font-bold text-black dark:text-white">{item.name}</h4>
                                <p className="text-sm text-[#E60000] font-semibold uppercase tracking-wide mt-1">{item.role}</p>
                            </div>
                            <div className="absolute bottom-4 right-4 text-xs text-gray-300 dark:text-gray-600">{index + 1} / 4</div>
                            </div>
                        ))}
                        </div>
                    </div>
                    </div>
                </section>

                {/* Contact Section */}
                <section id="kontakt" className="py-20 bg-[#FFF5F5] dark:bg-[#140a0a]">
                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                    <h2 className="text-3xl lg:text-4xl font-bold text-black dark:text-white mb-6">Posuňte vašu firmu vpred</h2>
                    <p className="text-xl text-[#54595F] dark:text-gray-400 mb-10">Máte záujem o workshop na mieru alebo sa chcete poradiť, ktorý kurz je pre vás vhodný?</p>

                    <div className="flex flex-col sm:flex-row justify-center gap-6">
                        <a href={LINKEDIN_URL} target="_blank" rel="noreferrer"
                        className="flex items-center justify-center gap-3 bg-[#0077b5] hover:bg-[#006396] text-white px-8 py-4 rounded-xl font-bold text-lg transition-all shadow-lg hover:shadow-xl hover:-translate-y-1">
                        <Linkedin size={24} /> Napíšte mi na LinkedIn
                        </a>
                        <a href="mailto:rastislav.kozlik@balanced-hr.com"
                        className="flex items-center justify-center gap-3 bg-white dark:bg-[#161616] hover:bg-gray-50 dark:hover:bg-[#1c1c1c] text-black dark:text-white border-2 border-gray-200 dark:border-gray-700 px-8 py-4 rounded-xl font-bold text-lg transition-all hover:border-[#E60000] hover:text-[#E60000]">
                        <Mail size={24} className="text-[#E60000]" /> Kontaktovať mailom
                        </a>
                    </div>

                    <div className="mt-16 border-t border-red-200 dark:border-gray-800 pt-8">
                        <p className="text-[#54595F] dark:text-gray-500 text-sm">© {new Date().getFullYear()} Rasťo Kozlík · AI Konzultant. Všetky práva vyhradené.</p>
                    </div>
                    </div>
                </section>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RastoKozlikProfile />);
    </script>
</body>
</html>
